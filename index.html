<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Gym ERP Prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Segoe UI; display:flex; background:#0f172a; color:#fff; }

/* Sidebar */
.sidebar {
  width:240px;
  background:#020617;
  padding:20px;
  height:100vh;
}
.sidebar h2 { margin-bottom:20px; }
.sidebar button {
  width:100%; padding:12px;
  margin:6px 0;
  background:#1e293b;
  border:none;
  color:white;
  cursor:pointer;
  border-radius:8px;
}

/* Main */
.main { flex:1; padding:20px; }

.card {
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:10px;
}

input, select {
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:none;
}

button.action {
  padding:6px 10px;
  margin:3px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.green { background:#22c55e; }
.red { background:#ef4444; }
.yellow { background:#f59e0b; }

.badge {
  padding:3px 8px;
  border-radius:10px;
  font-size:12px;
}

.client {
  background:#020617;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}
</style>

</head>

<body>

<div class="sidebar">
<h2>🏋️ Gym ERP</h2>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('clients')">Clients</button>
<button onclick="show('attendance')">Attendance</button>
<button onclick="show('payments')">Payments</button>
</div>

<div class="main" id="content"></div>

<script>
let clients = JSON.parse(localStorage.getItem("gym_proto")) || [];

function save(){
  localStorage.setItem("gym_proto", JSON.stringify(clients));
}

function status(exp){
  let d = (new Date(exp)-new Date())/(1000*60*60*24);
  if(d<0) return ["Expired","red"];
  if(d<3) return ["Due","yellow"];
  return ["Active","green"];
}

/* Dashboard */
function dashboard(){
let total = clients.length;
let revenue = clients.reduce((a,c)=>a+c.fee,0);
let expired = clients.filter(c=>status(c.expiry)[0]=="Expired").length;

return `
<h2>Dashboard</h2>
<div class="grid">
<div class="card">Clients<br><b>${total}</b></div>
<div class="card">Revenue<br><b>₹${revenue}</b></div>
<div class="card">Expired<br><b>${expired}</b></div>
<div class="card">Today<br><b>${new Date().toLocaleDateString()}</b></div>
</div>`;
}

/* Clients */
function clientsPage(){
return `
<h2>Clients</h2>

<div class="card">
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<select id="plan">
<option value="30">Monthly</option>
<option value="90">3 Months</option>
<option value="365">Yearly</option>
</select>
<input id="fee" type="number" placeholder="Fee ₹">
<button onclick="add()">Add Client</button>
</div>

<div class="card">
${clients.map((c,i)=>{
let [s,color]=status(c.expiry);
return `
<div class="client">
<b>${c.name}</b> (${c.phone || "-"}) 
<span class="badge ${color}">${s}</span><br>
Expiry: ${new Date(c.expiry).toLocaleDateString()}<br>

<button class="action green" onclick="checkin(${i})">Check-in</button>
<button class="action red" onclick="del(${i})">Delete</button>

<div style="font-size:12px;">Visits: ${c.attendance.length}</div>
</div>`;
}).join("")}
</div>`;
}

/* Attendance */
function attendancePage(){
return `
<h2>Attendance</h2>
<div class="card">
${clients.map(c=>`${c.name} → ${c.attendance.length} visits<br>`).join("")}
</div>`;
}

/* Payments */
function paymentsPage(){
return `
<h2>Payments</h2>
<div class="card">
${clients.map(c=>`${c.name} → ₹${c.fee} → ${new Date(c.expiry).toLocaleDateString()}<br>`).join("")}
</div>`;
}

/* Actions */
function add(){
let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let plan = parseInt(document.getElementById("plan").value);
let fee = parseInt(document.getElementById("fee").value);

if(!name || !fee) return alert("Enter details");

let exp = new Date();
exp.setDate(exp.getDate()+plan);

clients.push({name,phone,fee,expiry:exp,attendance:[]});
save();
show('clients');
}

function checkin(i){
clients[i].attendance.push(new Date().toDateString());
save();
show('clients');
}

function del(i){
if(confirm("Delete?")){
clients.splice(i,1);
save();
show('clients');
}
}

/* Nav */
function show(p){
let html="";
if(p=="dashboard") html=dashboard();
if(p=="clients") html=clientsPage();
if(p=="attendance") html=attendancePage();
if(p=="payments") html=paymentsPage();

document.getElementById("content").innerHTML=html;
}

show('dashboard');
</script>

</body>
</html>
