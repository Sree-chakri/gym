<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Gym SaaS Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Inter, Segoe UI;
  background:#0b0f1a;
  color:#e5e7eb;
}

/* Layout */
.app { display:flex; height:100vh; }

.sidebar {
  width:220px;
  background:#020617;
  padding:15px;
  border-right:1px solid #1f2937;
}

.sidebar h2 {
  color:#38bdf8;
}

.sidebar button {
  width:100%;
  padding:10px;
  margin:5px 0;
  background:none;
  border:none;
  color:#cbd5f5;
  text-align:left;
  cursor:pointer;
  border-radius:6px;
}

.sidebar button:hover {
  background:#1e293b;
}

/* Main */
.main { flex:1; display:flex; flex-direction:column; }

.topbar {
  padding:12px 20px;
  border-bottom:1px solid #1f2937;
  display:flex;
  justify-content:space-between;
}

.content {
  padding:15px;
  overflow:auto;
}

/* Dashboard cards */
.grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.card {
  background:#020617;
  padding:12px;
  border-radius:8px;
  border:1px solid #1f2937;
}

.card p {
  font-size:20px;
  margin:5px 0;
}

/* Table */
table {
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

th, td {
  padding:8px;
  border-bottom:1px solid #1f2937;
}

th {
  color:#9ca3af;
  text-transform:uppercase;
  font-size:11px;
}

/* Badges */
.badge {
  padding:2px 6px;
  border-radius:6px;
  font-size:11px;
}

.green { background:#16a34a; }
.red { background:#dc2626; }
.yellow { background:#ca8a04; }

/* Buttons */
button.action {
  padding:4px 6px;
  font-size:11px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  margin:1px;
}

.check { background:#22c55e; }
.delete { background:#ef4444; }

/* Inputs */
input, select {
  padding:6px;
  margin:3px;
  background:#020617;
  border:1px solid #1f2937;
  color:white;
  border-radius:5px;
}

/* Highlight row */
tr:hover {
  background:#111827;
}
</style>

</head>

<body>

<div class="app">

<div class="sidebar">
<h2>⚡ Gym</h2>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('clients')">Clients</button>
<button onclick="show('workouts')">Workouts</button>
</div>

<div class="main">
<div class="topbar">
<div>Gym ERP</div>
<div>Admin</div>
</div>

<div class="content" id="content"></div>
</div>

</div>

<script>

let clients = JSON.parse(localStorage.getItem("gym_pro")) || [
  {name:"Rahul",phone:"9876",fee:2000,expiry:new Date(Date.now()+5*86400000),attendance:2},
  {name:"Arjun",phone:"9123",fee:1500,expiry:new Date(Date.now()-2*86400000),attendance:1},
  {name:"Kiran",phone:"9000",fee:2500,expiry:new Date(Date.now()+1*86400000),attendance:3}
];

function save(){
  localStorage.setItem("gym_pro", JSON.stringify(clients));
}

function status(exp){
  let d=(new Date(exp)-new Date())/(1000*60*60*24);
  if(d<0) return ["Expired","red"];
  if(d<3) return ["Due","yellow"];
  return ["Active","green"];
}

/* Dashboard */
function dashboard(){
let revenue=clients.reduce((a,c)=>a+c.fee,0);

return `
<div class="grid">
<div class="card">Clients<p>${clients.length}</p></div>
<div class="card">Revenue<p>₹${revenue}</p></div>
<div class="card">Expired<p>${clients.filter(c=>status(c.expiry)[0]=="Expired").length}</p></div>
<div class="card">Today<p>${new Date().toLocaleDateString()}</p></div>
</div>`;
}

/* Clients (Dense Table) */
function clientsPage(){
return `
<h3>Add Client</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="fee" type="number" placeholder="Fee">
<input type="date" id="date">
<button onclick="add()">Add</button>

<h3>Clients</h3>
<table>
<tr>
<th>Name</th><th>Phone</th><th>Fee</th><th>Expiry</th><th>Status</th><th>Visits</th><th>Actions</th>
</tr>

${clients.map((c,i)=>{
let [s,color]=status(c.expiry);
return `
<tr>
<td>${c.name}</td>
<td>${c.phone}</td>
<td>₹${c.fee}</td>
<td>${new Date(c.expiry).toLocaleDateString()}</td>
<td><span class="badge ${color}">${s}</span></td>
<td>${c.attendance}</td>
<td>
<button class="action check" onclick="checkin(${i})">✓</button>
<button class="action delete" onclick="del(${i})">X</button>
</td>
</tr>`;
}).join("")}

</table>`;
}

/* Workouts */
function workoutsPage(){
return `
<h3>Workout Reference</h3>
<div class="card">Chest → Bench, Incline, Fly, Pushups, Dips</div>
<div class="card">Back → Pullups, Rows, Deadlift</div>
<div class="card">Legs → Squats, Lunges, Press</div>`;
}

/* Actions */
function add(){
let name=name.value;
let phone=phone.value;
let fee=parseInt(fee.value);
let date=date.value;

if(!name||!fee) return;

clients.push({
name,phone,fee,
expiry:new Date(date||Date.now()+30*86400000),
attendance:0
});

save();
show('clients');
}

function checkin(i){
clients[i].attendance++;
save();
show('clients');
}

function del(i){
clients.splice(i,1);
save();
show('clients');
}

/* Nav */
function show(p){
if(p=="dashboard") content.innerHTML=dashboard();
if(p=="clients") content.innerHTML=clientsPage();
if(p=="workouts") content.innerHTML=workoutsPage();
}

show('dashboard');
</script>

</body>
</html>
