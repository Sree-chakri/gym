<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Gym Ultra UI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --bg:#050816;
  --text:#fff;
}

.light {
  --bg:#f1f5f9;
  --text:#111;
}

body {
  margin:0;
  font-family:Segoe UI;
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
}

/* Layout */
.app { display:flex; height:100vh; }

/* Sidebar */
.sidebar {
  width:240px;
  padding:15px;
  backdrop-filter:blur(10px);
}

/* Animated border */
.glow-border {
  border:2px solid transparent;
  background:linear-gradient(var(--bg),var(--bg)) padding-box,
  linear-gradient(270deg,#00f0ff,#ff00ff,#00ff88) border-box;
  background-size:300% 300%;
  animation:move 6s infinite linear;
}

@keyframes move {
  0%{background-position:0%}
  100%{background-position:300%}
}

.sidebar h2 {
  text-align:center;
}

.sidebar button {
  width:100%;
  padding:12px;
  margin:6px 0;
  background:rgba(255,255,255,0.05);
  border:none;
  color:var(--text);
  cursor:pointer;
  border-radius:8px;
}

/* Main */
.main { flex:1; display:flex; flex-direction:column; }

.topbar {
  padding:12px;
  display:flex;
  justify-content:space-between;
}

/* Cards */
.card {
  padding:12px;
  margin:10px;
  border-radius:10px;
  backdrop-filter:blur(10px);
  background:rgba(255,255,255,0.05);
}

/* Grid */
.grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
}

/* Table */
table {
  width:100%;
  border-collapse:collapse;
}

td, th {
  padding:8px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

/* Inputs */
input {
  padding:6px;
  margin:4px;
  background:transparent;
  border:1px solid rgba(255,255,255,0.3);
  color:var(--text);
}

/* Buttons */
button.action {
  padding:4px 6px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.check { background:#00ff88; }
.delete { background:#ff004c; }

/* Chart */
canvas {
  width:100%;
  height:200px;
}
</style>

</head>

<body>

<div class="app">

<div class="sidebar glow-border">
<h2>⚡ Gym UI</h2>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('clients')">Clients</button>
<button onclick="toggleTheme()">🌗 Toggle Theme</button>
</div>

<div class="main">
<div class="topbar">Ultra SaaS Panel</div>

<div id="content"></div>
</div>

</div>

<script>

/* Data */
let clients = JSON.parse(localStorage.getItem("gym_ultra")) || [
  {name:"Rahul",fee:2000,attendance:2},
  {name:"Arjun",fee:1500,attendance:1},
  {name:"Kiran",fee:2500,attendance:3}
];

function save(){
localStorage.setItem("gym_ultra", JSON.stringify(clients));
}

/* Dashboard */
function dashboard(){
let revenue = clients.reduce((a,c)=>a+c.fee,0);

setTimeout(drawChart,100);

return `
<div class="grid">
<div class="card glow-border">Clients<br><b>${clients.length}</b></div>
<div class="card glow-border">Revenue<br><b>₹${revenue}</b></div>
</div>

<div class="card glow-border">
<h3>Revenue Chart</h3>
<canvas id="chart"></canvas>
</div>`;
}

/* Chart */
function drawChart(){
let canvas = document.getElementById("chart");
let ctx = canvas.getContext("2d");

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.beginPath();
ctx.strokeStyle="#00f0ff";
ctx.lineWidth=3;

let values = clients.map(c=>c.fee/100);
values.forEach((v,i)=>{
let x = i*80+20;
let y = 150-v;
if(i===0) ctx.moveTo(x,y);
else ctx.lineTo(x,y);
});

ctx.stroke();
}

/* Clients */
function clientsPage(){
return `
<div class="card glow-border">
<input id="name" placeholder="Name">
<input id="fee" placeholder="Fee">
<button onclick="add()">Add</button>
</div>

<div class="card glow-border">
<table>
<tr><th>Name</th><th>Fee</th><th>Visits</th><th></th></tr>
${clients.map((c,i)=>`
<tr>
<td>${c.name}</td>
<td>${c.fee}</td>
<td>${c.attendance}</td>
<td>
<button class="action check" onclick="checkin(${i})">+</button>
<button class="action delete" onclick="del(${i})">X</button>
</td>
</tr>
`).join("")}
</table>
</div>`;
}

/* Actions */
function add(){
let n=name.value;
let f=parseInt(fee.value);
if(!n||!f) return;

clients.push({name:n,fee:f,attendance:0});
save();
show('clients');
}

function checkin(i){
clients[i].attendance++;
save();
show('clients');
}

function del(i){
clients.splice(i,1);
save();
show('clients');
}

/* Theme */
function toggleTheme(){
document.body.classList.toggle("light");
}

/* Nav */
function show(p){
if(p=="dashboard") content.innerHTML=dashboard();
if(p=="clients") content.innerHTML=clientsPage();
}

show('dashboard');
</script>

</body>
</html>
