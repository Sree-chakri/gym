<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Gym ERP Futuristic</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:Segoe UI;
  display:flex;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:#e2e8f0;
}

/* Sidebar */
.sidebar {
  width:240px;
  background:rgba(15,23,42,0.9);
  backdrop-filter: blur(10px);
  padding:20px;
  height:100vh;
  border-right:1px solid rgba(255,255,255,0.05);
}

.sidebar h2 { color:#38bdf8; }

.sidebar button {
  width:100%;
  padding:12px;
  margin:6px 0;
  background:transparent;
  border:1px solid rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
  border-radius:8px;
  transition:0.2s;
}

.sidebar button:hover {
  background:#38bdf8;
  color:black;
}

/* Main */
.main { flex:1; padding:20px; }

.card {
  background:rgba(30,41,59,0.6);
  backdrop-filter: blur(12px);
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  border:1px solid rgba(255,255,255,0.05);
  box-shadow:0 0 20px rgba(56,189,248,0.1);
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:10px;
}

input, select {
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:none;
  background:#020617;
  color:white;
}

button.action {
  padding:6px 10px;
  margin:3px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.green { background:#22c55e; }
.red { background:#ef4444; }
.yellow { background:#f59e0b; }

.badge {
  padding:3px 8px;
  border-radius:10px;
  font-size:12px;
}

.client {
  background:#020617;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  border:1px solid rgba(255,255,255,0.05);
}
</style>

</head>

<body>

<div class="sidebar">
<h2>⚡ Gym ERP</h2>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('clients')">Clients</button>
<button onclick="show('attendance')">Attendance</button>
<button onclick="show('payments')">Payments</button>
<button onclick="show('workouts')">Workouts</button>
</div>

<div class="main" id="content"></div>

<script>

/* SAMPLE DATA */
let clients = JSON.parse(localStorage.getItem("gym_proto")) || [
  {
    name:"Rahul",
    phone:"9876543210",
    fee:2000,
    expiry:new Date(Date.now()+5*86400000),
    attendance:["Mon","Tue"]
  },
  {
    name:"Arjun",
    phone:"9123456780",
    fee:1500,
    expiry:new Date(Date.now()-2*86400000),
    attendance:["Mon"]
  },
  {
    name:"Kiran",
    phone:"9000000000",
    fee:2500,
    expiry:new Date(Date.now()+1*86400000),
    attendance:["Mon","Tue","Wed"]
  }
];

function save(){
  localStorage.setItem("gym_proto", JSON.stringify(clients));
}

function status(exp){
  let d = (new Date(exp)-new Date())/(1000*60*60*24);
  if(d<0) return ["Expired","red"];
  if(d<3) return ["Due","yellow"];
  return ["Active","green"];
}

/* Dashboard */
function dashboard(){
let total = clients.length;
let revenue = clients.reduce((a,c)=>a+c.fee,0);
let expired = clients.filter(c=>status(c.expiry)[0]=="Expired").length;

return `
<h2>Dashboard</h2>
<div class="grid">
<div class="card">Clients<br><b>${total}</b></div>
<div class="card">Revenue<br><b>₹${revenue}</b></div>
<div class="card">Expired<br><b>${expired}</b></div>
<div class="card">Today<br><b>${new Date().toLocaleDateString()}</b></div>
</div>`;
}

/* Clients */
function clientsPage(){
return `
<h2>Clients</h2>

<div class="card">
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<select id="plan">
<option value="30">Monthly</option>
<option value="90">3 Months</option>
<option value="365">Yearly</option>
</select>

<label>Custom Expiry</label>
<input type="date" id="customDate">

<input id="fee" type="number" placeholder="Fee ₹">
<button onclick="add()">Add Client</button>
</div>

<div class="card">
${clients.map((c,i)=>{
let [s,color]=status(c.expiry);
return `
<div class="client">
<b>${c.name}</b> (${c.phone})
<span class="badge ${color}">${s}</span><br>
Expiry: ${new Date(c.expiry).toLocaleDateString()}<br>

<button class="action green" onclick="checkin(${i})">Check-in</button>
<button class="action red" onclick="del(${i})">Delete</button>

<div style="font-size:12px;">Visits: ${c.attendance.length}</div>
</div>`;
}).join("")}
</div>`;
}

/* Attendance */
function attendancePage(){
return `
<h2>Attendance</h2>
<div class="card">
${clients.map(c=>`${c.name} → ${c.attendance.length} visits<br>`).join("")}
</div>`;
}

/* Payments */
function paymentsPage(){
return `
<h2>Payments</h2>
<div class="card">
${clients.map(c=>`${c.name} → ₹${c.fee} → ${new Date(c.expiry).toLocaleDateString()}<br>`).join("")}
</div>`;
}

/* Workouts */
function workoutsPage(){
return `
<h2>Workouts</h2>

<div class="card"><b>Chest</b><br>
Bench Press, Incline Press, Fly, Pushups, Dips</div>

<div class="card"><b>Back</b><br>
Pull-ups, Rows, Deadlift, Lat Pulldown, Cable Row</div>

<div class="card"><b>Legs</b><br>
Squats, Lunges, Leg Press, Curl, Calf Raise</div>

<div class="card"><b>Shoulders</b><br>
Press, Lateral Raise, Front Raise, Rear Fly, Shrugs</div>

<div class="card"><b>Arms</b><br>
Curls, Hammer, Pushdown, Skull Crushers, Dips</div>`;
}

/* Actions */
function add(){
let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let plan = parseInt(document.getElementById("plan").value);
let fee = parseInt(document.getElementById("fee").value);
let customDate = document.getElementById("customDate").value;

if(!name || !fee) return alert("Enter details");

let exp = customDate ? new Date(customDate) : new Date(Date.now()+plan*86400000);

clients.push({name,phone,fee,expiry:exp,attendance:[]});
save();
show('clients');
}

function checkin(i){
clients[i].attendance.push(new Date().toDateString());
save();
show('clients');
}

function del(i){
if(confirm("Delete?")){
clients.splice(i,1);
save();
show('clients');
}
}

/* Nav */
function show(p){
let html="";
if(p=="dashboard") html=dashboard();
if(p=="clients") html=clientsPage();
if(p=="attendance") html=attendancePage();
if(p=="payments") html=paymentsPage();
if(p=="workouts") html=workoutsPage();

document.getElementById("content").innerHTML=html;
}

show('dashboard');
</script>

</body>
</html>
